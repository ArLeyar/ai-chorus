name: Claude Review

# Adds Anthropic's official claude-code-action as a second, paid-tier
# reviewer alongside ai-chorus's free-tier multi-model review.
# Authenticates via Claude Max subscription OAuth token (no per-token
# billing — covered by the existing $200/mo Max plan).
#
# Token setup (one-time):
#   1. claude setup-token         (locally)
#   2. gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ArLeyar/ai-chorus
#
# When the secret is missing the action skips silently — no Action failure.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    name: Claude PR review (Anthropic)
    runs-on: ubuntu-latest
    # Skip when the OAuth secret isn't configured. Avoids failed runs on
    # forks or before token setup is done.
    if: ${{ vars.CLAUDE_REVIEW_ENABLED != 'false' }}
    permissions:
      pull-requests: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a senior engineer reviewing this pull request.

            You have full repo access via the action's built-in tools.
            Use them — read related files, search for callers, verify
            cross-file impact before reporting issues.

            Format the comment with these sections (skip empty ones):
              ## Summary — one sentence overall verdict
              ## Critical / Major / Minor — findings grouped by severity
              ## Notes — non-blocking observations or praise

            For each finding: file:line, what's wrong, why it matters,
            evidence from the code. No filler, no restating the diff,
            no praise paragraphs unless something is genuinely well-done.
            If the diff is clean, say so in one line.
