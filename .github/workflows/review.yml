name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel an in-progress review when new commits land on the same PR.
concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Multi-model PR review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Dogfood: ai-chorus reviews itself by invoking its own composite
      # action via `uses: ./`. This proves the published action surface
      # works on at least one real repo (this one) before tagging.
      - uses: ./
        with:
          providers: gemini,groq,openrouter
          polish: '1'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
