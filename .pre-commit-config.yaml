# Run lightweight checks on every commit.
# Heavy checks (mypy, pytest) are intentionally CI-only — keeping the local
# commit hook fast preserves the development flow.
#
# Install once with:    make hooks
# Skip a hook ad-hoc:   SKIP=ruff git commit ...

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin version; updates handled via `pre-commit autoupdate`.
    rev: v0.15.12
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff (format)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
